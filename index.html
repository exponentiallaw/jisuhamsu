<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>EONG DEONGI killer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: #111;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }
        #game-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
        }
        canvas {
            background-color: #ffd1dc; /* 요구사항 3: 연분홍색 배경 설정 */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: block;
            touch-action: none;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #333;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
        /* 요구사항 1 & 2: 오프닝 및 스코어보드 UI */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            padding: 20px;
        }
        #overlay h1 {
            font-size: 32px;
            color: #ffb6c1;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #nickname-input {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #ffb6c1;
            margin-bottom: 15px;
            text-align: center;
            width: 200px;
            outline: none;
        }
        #start-btn {
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            background: #ff4757;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        #start-btn:active {
            transform: scale(0.95);
        }
        #scoreboard {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            width: 260px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }
        #scoreboard h3 {
            margin-bottom: 8px;
            color: #ffd1dc;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-container">
            <div class="score-box">SCORE: <span id="current-score">0</span></div>
        </div>

        <div id="overlay">
            <h1>EONG DEONGI killer</h1>
            <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대5자)" maxlength="5" value="플레이어">
            <button id="start-btn" onclick="startGame()">START GAME</button>
            <div id="scoreboard"></div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const V_WIDTH = 400;
        const V_HEIGHT = 600;

        let score = 0;
        let gameActive = false;
        let mode = 'NORMAL'; 

        let gameTime = 0;
        let spawnTimer = 0;
        let itemSpawnTimer = 0;
        let feverGauge = 0; 
        
        let currentSpawnDelay = 60;
        let currentFallSpeed = 4;
        const MIN_SPAWN_DELAY = 15;
        const MAX_FALL_SPEED = 12;

        const player = {
            x: V_WIDTH / 2,
            y: V_HEIGHT - 60,
            size: 40,
            speed: 7,
            emoji: "🏃",
            hasShield: false
        };

        let butts = [];
        let items = [];
        let stars = []; 

        const input = { left: false, right: false };
        const currentScoreElement = document.getElementById('current-score');
        
        // 랭킹 데이터 불러오기 (닉네임 + 스코어 객체 배열 구조)
        let rankingList = JSON.parse(localStorage.getItem('eong_deongi_rankings') || '[]');

        function resizeCanvas() {
            canvas.width = V_WIDTH;
            canvas.height = V_HEIGHT;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
        }
        resizeCanvas(); 

        // PC 키보드 제어
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = false;
        });

        // 마우스 및 터치 입력 통합
        function handlePointerDown(clientX) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (V_WIDTH / rect.width);
            if (canvasX < V_WIDTH / 2) input.left = true;
            else input.right = true;
        }

        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            handlePointerDown(e.touches[0].clientX);
        }, { passive: false });
        
        window.addEventListener('touchend', () => {
            input.left = false;
            input.right = false;
        });
        
        window.addEventListener('mousedown', (e) => {
            handlePointerDown(e.clientX);
        });
        
        window.addEventListener('mouseup', () => {
            input.left = false;
            input.right = false;
        });

        function spawnObject(arr, emoji, size, speed) {
            const minX = size / 2;
            const maxX = V_WIDTH - size / 2;
            const randomX = Math.random() * (maxX - minX) + minX;
            arr.push({ x: randomX, y: -size, size: size, speed: speed, emoji: emoji });
        }

        function checkCollision(obj1, obj2) {
            const distX = obj1.x - obj2.x;
            const distY = obj1.y - obj2.y;
            const distance = Math.sqrt(distX * distX + distY * distY);
            return distance < (obj1.size / 2)*0.75 + (obj2.size / 2)*0.75;
        }

        // 스코어보드 UI 갱신 기능 (요구사항 2)
        function drawScoreboard() {
            const board = document.getElementById('scoreboard');
            if (rankingList.length === 0) {
                board.innerHTML = '<h3>🏆실시간 TOP 5🏆</h3><p style="color:#aaa;">아직 기록이 없습니다.</p>';
                return;
            }
            let html = '<h3>🏆실시간 TOP 5🏆</h3>';
            rankingList.forEach((record, index) => {
                html += `<p>${index + 1}등: <b>${record.name}</b> - ${record.score}점</p>`;
            });
            board.innerHTML = html;
        }

        // 게임 시작 실행
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            score = 0; gameTime = 0; spawnTimer = 0; itemSpawnTimer = 0; feverGauge = 0;
            currentSpawnDelay = 60; currentFallSpeed = 4;
            butts = []; items = []; stars = [];
            player.x = V_WIDTH / 2; player.hasShield = false;
            input.left = false; input.right = false;
            currentScoreElement.innerText = score;
            gameActive = true;
            mode = 'NORMAL';
            requestAnimationFrame(gameLoop);
        }

        // 게임 오버 처리 및 랭킹 세이브 (요구사항 2)
        function gameOver() {
            gameActive = false;
            let currentNickname = document.getElementById('nickname-input').value.trim() || '익명';
            
            // 신규 기록 추가 후 정렬 및 TOP 5 커트
            rankingList.push({ name: currentNickname, score: score });
            rankingList.sort((a, b) => b.score - a.score);
            rankingList = rankingList.slice(0, 5);
            
            localStorage.setItem('eong_deongi_rankings', JSON.stringify(rankingList));
            
            drawScoreboard();
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').querySelector('h1').innerText = "GAME OVER";
        }

        // 게이지 UI 그리기 (요구사항 6: 이름 변경)
        function drawFeverGauge() {
            const gaugeWidth = 200;
            const gaugeHeight = 15;
            const gaugeX = V_WIDTH / 2 - gaugeWidth / 2;
            const gaugeY = 70;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(gaugeX, gaugeY, gaugeWidth, gaugeHeight);
            
            const fillWidth = (feverGauge / 100) * gaugeWidth;
            ctx.fillStyle = mode === 'FEVER' ? '#ff4757' : '#2ed573';
            ctx.fillRect(gaugeX, gaugeY, fillWidth, gaugeHeight);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Arial';
            // 요구사항 6: 피버 게이지 명칭을 '엉덩이 시간'으로 통합 변경
            ctx.fillText(mode === 'FEVER' ? '🔥 엉덩이 시간! 🔥' : '엉덩이 시간', V_WIDTH / 2, gaugeY + gaugeHeight / 2 + 1);
        }

        // 메인 게임 루프
        function gameLoop() {
            if (!gameActive) return; 

            if (input.left) player.x -= player.speed;
            if (input.right) player.x += player.speed;
            if (player.x < player.size / 2) player.x = player.size / 2;
            if (player.x > V_WIDTH - player.size / 2) player.x = V_WIDTH - player.size / 2;

            if (mode === 'NORMAL') {
                gameTime++;
                if (gameTime % 60 === 0) {
                    if (currentFallSpeed < MAX_FALL_SPEED) currentFallSpeed += 0.15;
                    if (currentSpawnDelay > MIN_SPAWN_DELAY) currentSpawnDelay -= 0.5;
                }

                spawnTimer++;
                if (spawnTimer >= currentSpawnDelay) {
                    spawnObject(butts, "🍑", 45, currentFallSpeed + (Math.random() * 2 - 1));
                    spawnTimer = 0; 
                }

                itemSpawnTimer++;
                if (itemSpawnTimer >= 450) {
                    if (!player.hasShield) spawnObject(items, "🛡️", 35, 3);
                    itemSpawnTimer = 0;
                }

                for (let i = items.length - 1; i >= 0; i--) {
                    items[i].y += items[i].speed;
                    if (checkCollision(player, items[i])) {
                        player.hasShield = true;
                        items.splice(i, 1);
                        continue;
                    }
                    if (items[i].y > V_HEIGHT + items[i].size) items.splice(i, 1);
                }

                for (let i = butts.length - 1; i >= 0; i--) {
                    butts[i].y += butts[i].speed; 
                    if (checkCollision(player, butts[i])) {
                        if (player.hasShield) {
                            player.hasShield = false; 
                            butts.splice(i, 1);       
                            continue;                 
                        } else {
                            gameOver();
                            return; 
                        }
                    }
                    if (butts[i].y > V_HEIGHT + butts[i].size) {
                        butts.splice(i, 1); 
                        score += 10;
                        feverGauge = Math.min(100, feverGauge + 5); 
                        currentScoreElement.innerText = score; 
                    }
                }

                if (feverGauge >= 100) {
                    mode = 'FEVER';
                    butts = []; 
                    items = []; 
                }

            } else if (mode === 'FEVER') {
                spawnTimer++;
                if (spawnTimer >= 10) { 
                    spawnObject(stars, "⭐", 40, 8 + Math.random() * 2);
                    spawnTimer = 0;
                }

                for (let i = stars.length - 1; i >= 0; i--) {
                    stars[i].y += stars[i].speed;
                    if (checkCollision(player, stars[i])) {
                        stars.splice(i, 1);
                        score += 30; 
                        currentScoreElement.innerText = score;
                    } else if (stars[i].y > V_HEIGHT + stars[i].size) {
                        stars.splice(i, 1);
                    }
                }

                feverGauge -= 0.4; 
                if (feverGauge <= 0) {
                    mode = 'NORMAL';
                    feverGauge = 0;
                    stars = []; // 요구사항 4: 피버타임 종료 시 남아있는 별 무리 완전 제거
                }
            }

            // --- 렌더링 시작 ---
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT); 

            // 요구사항 5: 피버타임 작동 시 실시간 무지개 그라데이션 루프 배경 연출
            if (mode === 'FEVER') {
                let hue = (Date.now() / 15) % 360;
                ctx.fillStyle = `hsl(${hue}, 85%, 85%)`; 
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
            }
            
            drawFeverGauge();

            ctx.font = `${player.size}px Arial`;
            ctx.fillText(player.emoji, player.x, player.y);
            
            if (player.hasShield) {
                ctx.font = `${player.size * 0.8}px Arial`;
                ctx.fillText("🛡️", player.x, player.y - player.size * 0.7);
            }

            for (let i = 0; i < items.length; i++) {
                ctx.font = `${items[i].size}px Arial`;
                ctx.fillText(items[i].emoji, items[i].x, items[i].y);
            }
            for (let i = 0; i < butts.length; i++) {
                ctx.font = `${butts[i].size}px Arial`;
                ctx.fillText(butts[i].emoji, butts[i].x, butts[i].y);
            }
            for (let i = 0; i < stars.length; i++) {
                ctx.font = `${stars[i].size}px Arial`;
                ctx.fillText(stars[i].emoji, stars[i].x, stars[i].y);
            }
            
            requestAnimationFrame(gameLoop);
        }

        // 초기 화면 세팅
        drawScoreboard();
    </script>
</body>
</html>
