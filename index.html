<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>EONG DEONGI killer</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            background-color: #111;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }
        #game-wrapper {
            position: relative;
            width: 400px;
            height: 600px;
        }
        canvas {
            background-color: #ffd1dc; 
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: block;
            touch-action: none;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #333;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }
        .score-box {
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            padding: 20px;
        }
        
        #overlay h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 44px;
            background: linear-gradient(to bottom, #ffb6c1, #ff4757);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            text-align: center;
        }
        
        /* 클리어 메시지 스타일 */
        #clear-message {
            display: none;
            color: #fff;
            background: rgba(255, 71, 87, 0.3);
            border: 1px solid #ff4757;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            width: 280px;
        }
        
        #nickname-input {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #ffb6c1;
            margin-bottom: 15px;
            text-align: center;
            width: 200px;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        #start-btn, #desc-btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        #start-btn { background: #ff4757; }
        #desc-btn { background: #2ed573; }
        
        #start-btn:active, #desc-btn:active {
            transform: scale(0.95);
        }
        #description-box {
            display: none;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 8px;
            width: 280px;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #scoreboard {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            width: 260px;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
        }
        #scoreboard h3 {
            margin-bottom: 8px;
            color: #ffd1dc;
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="ui-container">
            <div class="score-box">SCORE: <span id="current-score">0</span></div>
        </div>

        <div id="overlay">
            <h1 id="overlay-title">EONG DEONGI killer</h1>
            
            <div id="clear-message"></div>
            
            <input type="text" id="nickname-input" placeholder="닉네임 입력 (최대5자)" maxlength="5" value="플레이어">
            
            <div class="btn-group">
                <button id="start-btn" onclick="startGame()">게임 시작</button>
                <button id="desc-btn" onclick="toggleDescription()">설명 보기</button>
            </div>

            <div id="description-box">
                🏃 <b>조작 방법:</b> 화면 왼쪽/오른쪽 터치 또는 키보드 A, D (방향키)<br>
                🍑 <b>엉덩이:</b> 떨어지는 엉덩이를 피해야 한다. <br>
                🛡️ <b>방패:</b> 엉덩이를 한 번 막아준다.<br>
                🔥 <b>엉덩이 시간:</b> 게이지가 가득 차면 엉덩이 시간이 되며, 하늘에서 점수를 주는 별이 쏟아진다. 이건 피하지 말고 먹어야한다.
            </div>

            <div id="scoreboard"></div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const V_WIDTH = 400;
        const V_HEIGHT = 600;

        let score = 0;
        let gameActive = false;
        let mode = 'NORMAL'; 

        let gameTime = 0;
        let spawnTimer = 0;
        let itemSpawnTimer = 0;
        let feverGauge = 0; 
        
        let currentSpawnDelay = 60;
        let currentFallSpeed = 4;
        const MIN_SPAWN_DELAY = 15;
        const MAX_FALL_SPEED = 12;

        const player = {
            x: V_WIDTH / 2,
            y: V_HEIGHT - 65, 
            size: 40,
            speed: 7,
            emoji: "🏃",
            hasShield: false
        };

        let butts = [];
        let items = [];
        let stars = []; 

        const input = { left: false, right: false };
        const currentScoreElement = document.getElementById('current-score');
        
        let rankingList = JSON.parse(localStorage.getItem('eong_deongi_rankings') || '[]');

        function resizeCanvas() {
            canvas.width = V_WIDTH;
            canvas.height = V_HEIGHT;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
        }
        resizeCanvas(); 

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = true;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') input.left = false;
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') input.right = false;
        });

        function handlePointerDown(clientX) {
            if (!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (V_WIDTH / rect.width);
            if (canvasX < V_WIDTH / 2) input.left = true;
            else input.right = true;
        }

        window.addEventListener('touchstart', (e) => {
            if (!gameActive) return;
            e.preventDefault();
            handlePointerDown(e.touches[0].clientX);
        }, { passive: false });
        
        window.addEventListener('touchend', () => {
            input.left = false;
            input.right = false;
        });
        
        window.addEventListener('mousedown', (e) => {
            handlePointerDown(e.clientX);
        });
        
        window.addEventListener('mouseup', () => {
            input.left = false;
            input.right = false;
        });

        function toggleDescription() {
            const box = document.getElementById('description-box');
            if (box.style.display === 'block') {
                box.style.display = 'none';
            } else {
                box.style.display = 'block';
            }
        }

        function spawnObject(arr, emoji, size, speed) {
            const minX = size / 2;
            const maxX = V_WIDTH - size / 2;
            const randomX = Math.random() * (maxX - minX) + minX;
            arr.push({ x: randomX, y: -size, size: size, speed: speed, emoji: emoji });
        }

        function checkCollision(obj1, obj2) {
            const distX = obj1.x - obj2.x;
            const distY = obj1.y - obj2.y;
            const distance = Math.sqrt(distX * distX + distY * distY);
            return distance < (obj1.size / 2)*0.75 + (obj2.size / 2)*0.75;
        }

        function drawScoreboard() {
            const board = document.getElementById('scoreboard');
            if (rankingList.length === 0) {
                board.innerHTML = '<h3>🏆실시간 최고의 엉덩이 5🏆</h3><p style="color:#aaa;">아직 기록이 없습니다.</p>';
                return;
            }
            let html = '<h3>🏆실시간 최고의 엉덩이 5🏆</h3>';
            rankingList.forEach((record, index) => {
                html += `<p>${index + 1}등: <b>${record.name}</b> - ${record.score}점</p>`;
            });
            board.innerHTML = html;
        }

        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('description-box').style.display = 'none'; 
            document.getElementById('clear-message').style.display = 'none'; // 메시지 초기화
            document.getElementById('overlay-title').innerText = "EONG DEONGI killer";
            
            score = 0; gameTime = 0; spawnTimer = 0; itemSpawnTimer = 0; feverGauge = 0;
            currentSpawnDelay = 60; currentFallSpeed = 4;
            butts = []; items = []; stars = [];
            player.x = V_WIDTH / 2; player.hasShield = false;
            input.left = false; input.right = false;
            currentScoreElement.innerText = score;
            gameActive = true;
            mode = 'NORMAL';
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameActive = false;
            let currentNickname = document.getElementById('nickname-input').value.trim() || '익명';
            
            rankingList.push({ name: currentNickname, score: score });
            rankingList.sort((a, b) => b.score - a.score);
            rankingList = rankingList.slice(0, 5);
            
            localStorage.setItem('eong_deongi_rankings', JSON.stringify(rankingList));
            
            drawScoreboard();
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay').querySelector('h1').innerText = "GAME OVER";
        }

        // 게임 클리어 처리 함수
        function gameClear() {
            gameActive = false;
            let currentNickname = document.getElementById('nickname-input').value.trim() || '익명';
            
            rankingList.push({ name: currentNickname, score: score });
            rankingList.sort((a, b) => b.score - a.score);
            rankingList = rankingList.slice(0, 5);
            
            localStorage.setItem('eong_deongi_rankings', JSON.stringify(rankingList));
            
            drawScoreboard();
            
            // UI 업데이트
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('overlay-title').innerText = "🎉 우리언제모여? 🎉";
            
            const msgBox = document.getElementById('clear-message');
            msgBox.innerText = "클리어 ㅊㅊ";
            msgBox.style.display = 'block';
        }

        function drawFeverGauge() {
            const gaugeWidth = 200;
            const gaugeHeight = 15;
            const gaugeX = V_WIDTH / 2 - gaugeWidth / 2;
            const gaugeY = 70;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(gaugeX, gaugeY, gaugeWidth, gaugeHeight);
            
            const fillWidth = (feverGauge / 100) * gaugeWidth;
            ctx.fillStyle = mode === 'FEVER' ? '#ff4757' : '#2ed573';
            ctx.fillRect(gaugeX, gaugeY, fillWidth, gaugeHeight);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 12px Arial';
            ctx.fillText(mode === 'FEVER' ? '🔥 엉덩이 시간 🔥' : '엉덩이 시간', V_WIDTH / 2, gaugeY + gaugeHeight / 2 + 1);
        }

        function gameLoop() {
            if (!gameActive) return; 

            if (input.left) player.x -= player.speed;
            if (input.right) player.x += player.speed;
            if (player.x < player.size / 2) player.x = player.size / 2;
            if (player.x > V_WIDTH - player.size / 2) player.x = V_WIDTH - player.size / 2;

            const groundY = V_HEIGHT - 40;

            if (mode === 'NORMAL') {
                gameTime++;
                if (gameTime % 60 === 0) {
                    if (currentFallSpeed < MAX_FALL_SPEED) currentFallSpeed += 0.15;
                    if (currentSpawnDelay > MIN_SPAWN_DELAY) currentSpawnDelay -= 0.5;
                }

                spawnTimer++;
                if (spawnTimer >= currentSpawnDelay) {
                    spawnObject(butts, "🍑", 45, currentFallSpeed + (Math.random() * 2 - 1));
                    spawnTimer = 0; 
                }

                itemSpawnTimer++;
                if (itemSpawnTimer >= 450) {
                    if (!player.hasShield) spawnObject(items, "🛡️", 35, 3);
                    itemSpawnTimer = 0;
                }

                for (let i = items.length - 1; i >= 0; i--) {
                    items[i].y += items[i].speed;
                    if (checkCollision(player, items[i])) {
                        player.hasShield = true;
                        items.splice(i, 1);
                        continue;
                    }
                    if (items[i].y > groundY) items.splice(i, 1);
                }

                for (let i = butts.length - 1; i >= 0; i--) {
                    butts[i].y += butts[i].speed; 
                    if (checkCollision(player, butts[i])) {
                        if (player.hasShield) {
                            player.hasShield = false; 
                            butts.splice(i, 1);       
                            continue;                 
                        } else {
                            gameOver();
                            return; 
                        }
                    }
                    if (butts[i].y > groundY) {
                        butts.splice(i, 1); 
                        score += 10;
                        let gaugeGain = Math.max(1, 5 - Math.floor(score / 250));
                        feverGauge = Math.min(100, feverGauge + gaugeGain); 
                        currentScoreElement.innerText = score; 
                        
                        // 목표 점수 체크 (3131점)
                        if (score >= 3131) {
                            gameClear();
                            return;
                        }
                    }
                }

                if (feverGauge >= 100) {
                    mode = 'FEVER';
                    butts = []; 
                    items = []; 
                }

            } else if (mode === 'FEVER') {
                spawnTimer++;
                if (spawnTimer >= 10) { 
                    spawnObject(stars, "⭐", 40, 8 + Math.random() * 2);
                    spawnTimer = 0;
                }

                for (let i = stars.length - 1; i >= 0; i--) {
                    stars[i].y += stars[i].speed;
                    if (checkCollision(player, stars[i])) {
                        stars.splice(i, 1);
                        score += 30; 
                        currentScoreElement.innerText = score;
                        
                        // 목표 점수 체크 (3131점)
                        if (score >= 3131) {
                            gameClear();
                            return;
                        }
                    } else if (stars[i].y > groundY) { 
                        stars.splice(i, 1);
                    }
                }

                feverGauge -= 0.4; 
                if (feverGauge <= 0) {
                    mode = 'NORMAL';
                    feverGauge = 0;
                    stars = []; 
                }
            }

            // --- 렌더링 영역 ---
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT); 

            if (mode === 'FEVER') {
                let hue = (Date.now() / 15) % 360;
                ctx.fillStyle = `hsl(${hue}, 85%, 85%)`; 
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
            }
            
            ctx.fillStyle = "#cca0a6";
            ctx.fillRect(0, groundY, V_WIDTH, 40);
            
            ctx.fillStyle = "#b38289";
            ctx.fillRect(0, groundY, V_WIDTH, 4);

            drawFeverGauge();

            ctx.save(); 
            let tilt = 0;
            if (input.left) tilt = -0.15; 
            else if (input.right) tilt = 0.15; 
            
            ctx.translate(player.x, player.y); 
            ctx.rotate(tilt); 
            
            ctx.font = `${player.size}px Arial`;
            ctx.fillText(player.emoji, 0, 0); 
            
            if (player.hasShield) {
                ctx.font = `${player.size * 0.8}px Arial`;
                ctx.fillText("🛡️", 0, -player.size * 0.7);
            }
            
            ctx.restore(); 

            for (let i = 0; i < items.length; i++) {
                ctx.font = `${items[i].size}px Arial`;
                ctx.fillText(items[i].emoji, items[i].x, items[i].y);
            }
            for (let i = 0; i < butts.length; i++) {
                ctx.font = `${butts[i].size}px Arial`;
                ctx.fillText(butts[i].emoji, butts[i].x, butts[i].y);
            }
            for (let i = 0; i < stars.length; i++) {
                ctx.font = `${stars[i].size}px Arial`;
                ctx.fillText(stars[i].emoji, stars[i].x, stars[i].y);
            }
            
            requestAnimationFrame(gameLoop);
        }

        drawScoreboard();
    </script>
</body>
</html>
